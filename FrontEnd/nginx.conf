server {
    listen 80;
    server_name localhost;

    # Compresión para mejorar tiempos de carga (EF2)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Redirige todas las rutas al index.html para soportar React Router
        # (rutas del lado del cliente como /admin, /contrataciones, etc.).
        try_files $uri $uri/ /index.html;
    }

    # Caché de estáticos para mejorar el rendimiento (EF2)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
