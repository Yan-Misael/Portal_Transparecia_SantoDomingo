# compose.yaml
name: transparencia-backend

services:
  db:
    image: postgres:15-alpine
    container_name: transparencia_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Implementación de control de estado riguroso
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: api_transparencia
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy # Espera obligatoria hasta que PostgreSQL acepte tráfico
    # Ejecución secuencial: Migración -> Sembrado (opcional) -> Arranque del servidor
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

volumes:
  pgdata:
